<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/styleV.css">
    <title>some videos</title>
</head>
<body>

    <div class="content">
        <h1>Video</h1>
        <div class="video-player">
            <video controls>
                <source src="assets\Videos\Vordex-Slowed.mp4" type="video/mp4">
            </video>
        </div>
        <div class="description">
            <h3>description</h3>
            <p>
                this a musical video to test.
            </p>
        </div>
    </div>

    <div class="sidebar">
        <h2>Más Videos</h2>
        <a href="assets/Videos/Vordex-Slowed.mp4" onclick="loadVideo('Vordex-Slowed')">Vordex-Slowed</a>
        <a href="assets/Videos/Hypnotic-Slowed.mp4" onclick="loadVideo('Hypnotic-Slowed')">Hypnotic-Slowed</a>
        <a href="assets/Videos/FlyMeToTheMoon.mp4" onclick="loadVideo('Fly Me To The Moon')">Fly Me To The Moon</a>
        <a href="assets/Videos/Pasylo.mp4" onclick="loadVideo('Pasylo')">Pasylo</a>
    </div>

    <script>
        function loadVideo(videoFile) {
            var videoPlayer = document.getElementById('videoPlayer');
            videoPlayer.src = '../posts/assets/videos/' + videoFile;
            videoPlayer.play();
        }
    </script>

</body>
</html>
